name: Link check

# Verifies the external links in the README and catalog still resolve.
# Runs weekly (and on demand). Non-fatal: dead links are reported in an issue
# rather than failing a build, so a temporarily-down host never blocks work.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 8
            --timeout 25
            --max-retries 2
            --accept 200,206,403,429
            --exclude-mail
            README.md data/resources.yml
          fail: false

      - name: Open an issue if links are broken
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Broken links found by the weekly link check"
          content-filepath: ./lychee/out.md
          labels: link-check, automated
