name: sync-huggingface

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-huggingface-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    name: Sync catalog to Hugging Face
    runs-on: ubuntu-latest
    env:
      HF_REPO_ID: ${{ vars.HF_REPO_ID || 'cy0307/awesome-egocentric-atlas' }}
      HF_REPO_TYPE: ${{ vars.HF_REPO_TYPE || 'dataset' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Hugging Face token
        id: token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "$HF_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "HF_TOKEN is not configured; skipping Hugging Face sync."
          fi

      - name: Set up Python
        if: steps.token.outputs.available == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hugging Face CLI
        if: steps.token.outputs.available == 'true'
        run: python -m pip install --upgrade "huggingface_hub[cli]"

      - name: Create or update Hugging Face repo
        if: steps.token.outputs.available == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf repos create "$HF_REPO_ID" --type "$HF_REPO_TYPE" --exist-ok
          hf upload "$HF_REPO_ID" . \
            --type "$HF_REPO_TYPE" \
            --commit-message "Sync from GitHub ${GITHUB_SHA}" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".DS_Store" \
            --exclude "__pycache__/*"
