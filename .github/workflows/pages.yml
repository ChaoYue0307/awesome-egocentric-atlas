name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Stage static site
        run: |
          mkdir -p _site
          cp index.html styles.css app.js site-data.json README.md LICENSE CITATION.cff \
            feed.xml robots.txt sitemap.xml site.webmanifest _site/
          cp -R assets data docs _site/

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy static site
        id: deployment
        uses: actions/deploy-pages@v4
