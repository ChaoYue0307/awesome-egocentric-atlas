name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  catalog:
    name: Validate catalog and README
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Validate catalog and README links
        run: ruby scripts/validate_catalog.rb

      - name: Validate generated artifacts
        run: ruby scripts/build_artifacts.rb --check

      - name: Validate Hugging Face package
        run: ruby scripts/build_hf_package.rb --check
