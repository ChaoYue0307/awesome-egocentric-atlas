name: "Fix or flag an entry"
description: "Report a broken link, wrong status, outdated scale, or a resource that should be removed."
title: "[Fix] <resource name>"
labels: ["correction"]
body:
  - type: input
    id: name
    attributes:
      label: Resource name
      placeholder: "e.g. EgoLife"
    validations:
      required: true
  - type: dropdown
    id: problem
    attributes:
      label: What is wrong?
      options:
        - Broken or moved link
        - Incorrect public status
        - Outdated or inflated scale / numbers
        - Wrong kind or section
        - Duplicate entry
        - Should be removed (out of scope)
        - Other
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: "What is the correct value, and what is your source?"
    validations:
      required: true
