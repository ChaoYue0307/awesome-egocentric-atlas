# Controlled vocabulary for the Awesome Egocentric Atlas catalog.
#
# Purpose:
#   * Give readers a stable way to filter resources (see docs/taxonomy.md).
#   * Consolidate the many fine-grained `tasks:` / `modalities:` tokens used in
#     data/resources.yml into a smaller set of canonical families and aliases.
#
# How it is used:
#   * docs/taxonomy.md is the human-facing reference.
#   * scripts/validate_catalog.rb loads this file and WARNS (never fails) when a
#     resources.yml entry uses a task/modality token that is not listed here, so
#     the long tail can be normalized over time.
#
# A token is "known" if it equals a family key or appears in that family's
# `aliases:` list. Families are filtering groups, not mutually exclusive labels.

version: 1

statuses:
  open: Public download, annotations, code, or application-based access is clearly documented.
  request: Public project exists, but access needs a license, form, approval, or agreement.
  benchmark: Mainly a benchmark, challenge, labels, or evaluation over existing video.
  partial: Some assets are public, but full raw data, license, or longevity is unclear.
  watch: Recent or important resource whose release state still needs verification.

kinds:
  dataset: Raw or annotated first-person capture.
  benchmark: Evaluation suite, challenge, or labeled task over existing video.
  model: Trained model, method, or baseline.
  toolkit: Loader, API, SDK, or data tooling.
  survey: Survey, position paper, or background reference.
  challenge: Recurring workshop or challenge hub.
  collection: Portal or hub that aggregates several resources.

scopes:
  egocentric: Human or animal first-person capture, or ego-exo where the ego view is central.
  adjacent: Related but not first-person (robot-only, multi-view robotic, driving, general long-video).

