<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Awesome Egocentric Atlas system map</title>
  <desc id="desc">Awesome Egocentric Atlas pipeline: first-person capture sources feed multimodal signals, which feed research task families, which produce reusable, validated atlas artifacts, with a curate-verify-update feedback loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfdff"/>
      <stop offset="0.6" stop-color="#f4faf9"/>
      <stop offset="1" stop-color="#eef7f6"/>
    </linearGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#cfe0e4" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="135%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#0f2a33" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8aa2ab"/>
    </marker>
    <style>
      .ink { fill: #14212b; }
      .sub { fill: #586672; }
      .title { font: 700 30px system-ui, -apple-system, "Segoe UI", sans-serif; }
      .subtitle { font: 500 14.5px system-ui, -apple-system, "Segoe UI", sans-serif; }
      .kicker { font: 700 11.5px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0b8f98; letter-spacing: .14em; }
      .panel { fill: #ffffff; stroke: #d9e4e9; stroke-width: 1.4; filter: url(#shadow); }
      .ph { font: 700 16px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f3b45; }
      .row { font: 600 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #2b3a44; }
      .rowsub { font: 500 11.5px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #6a7882; }
      .divider { stroke: #e6eef1; stroke-width: 1.2; }
      .conn { stroke: #8aa2ab; stroke-width: 2.2; fill: none; }
      .loop { stroke: #00a6b2; stroke-width: 2.2; fill: none; stroke-dasharray: 2 7; stroke-linecap: round; }
      .chip { fill: #ffffff; stroke: #d9e4e9; stroke-width: 1.3; }
      .chiptext { font: 600 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #3a4a54; }
      .dotT { fill: #00a6b2; }
      .dotA { fill: #ef9f24; }
      .dotN { fill: #7c8b94; }
      .loopText { font: 700 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0b8f98; letter-spacing: .1em; }
    </style>
  </defs>

  <rect width="1200" height="560" fill="url(#bg)"/>
  <rect width="1200" height="560" fill="url(#dots)"/>

  <text class="kicker" x="65" y="52">EGOCENTRIC AI · SYSTEM MAP</text>
  <text class="title ink" x="65" y="84">Awesome Egocentric Atlas</text>
  <text class="subtitle sub" x="65" y="110">Curated egocentric AI datasets, benchmarks, models, and tools</text>

  <!-- stat chips -->
  <g>
    <rect class="chip" x="846" y="58" width="124" height="30" rx="15"/>
    <circle class="dotT" cx="868" cy="73" r="4"/>
    <text class="chiptext" x="880" y="77">101 resources</text>
    <rect class="chip" x="980" y="58" width="100" height="30" rx="15"/>
    <circle class="dotA" cx="1002" cy="73" r="4"/>
    <text class="chiptext" x="1014" y="77">6 lanes</text>
    <rect class="chip" x="1090" y="58" width="46" height="30" rx="15"/>
    <text class="chiptext" x="1102" y="77" font-size="11">5 states</text>
  </g>

  <!-- connectors -->
  <line class="conn" x1="298" y1="305" x2="340" y2="305" marker-end="url(#arrow)"/>
  <line class="conn" x1="578" y1="305" x2="620" y2="305" marker-end="url(#arrow)"/>
  <line class="conn" x1="858" y1="305" x2="900" y2="305" marker-end="url(#arrow)"/>

  <!-- Panel 1: Capture Sources -->
  <g transform="translate(65 185)">
    <rect class="panel" width="230" height="240" rx="18"/>
    <circle cx="34" cy="40" r="18" fill="#e9f7f7" stroke="#8fd2d4" stroke-width="1.4"/>
    <g stroke="#0b8f98" stroke-width="1.8" fill="none" stroke-linecap="round">
      <circle cx="29" cy="40" r="4.4"/>
      <circle cx="39.5" cy="40" r="4.4"/>
      <path d="M33.4 40 q1 -1.6 2.1 0"/>
      <path d="M24.6 39 l-2 1.4 M44 39 l2 1.4"/>
    </g>
    <text class="ph" x="62" y="45">Capture Sources</text>
    <line class="divider" x1="22" y1="68" x2="208" y2="68"/>
    <circle class="dotT" cx="30" cy="102" r="4"/>
    <text class="row" x="46" y="100">AR glasses</text>
    <text class="rowsub" x="46" y="117">Aria, HoloLens, Quest</text>
    <circle class="dotT" cx="30" cy="150" r="4"/>
    <text class="row" x="46" y="148">Wearable cameras</text>
    <text class="rowsub" x="46" y="165">head, chest, wrist, animal</text>
    <circle class="dotT" cx="30" cy="198" r="4"/>
    <text class="row" x="46" y="196">Ego-exo rigs</text>
    <text class="rowsub" x="46" y="213">synchronized multiview</text>
  </g>

  <!-- Panel 2: Signals -->
  <g transform="translate(345 185)">
    <rect class="panel" width="230" height="240" rx="18"/>
    <circle cx="34" cy="40" r="18" fill="#eef3f5" stroke="#bcccd3" stroke-width="1.4"/>
    <g stroke="#5b6b73" stroke-width="2" stroke-linecap="round">
      <line x1="27" y1="40" x2="27" y2="40"/>
      <line x1="27" y1="44" x2="27" y2="36"/>
      <line x1="31.5" y1="46" x2="31.5" y2="34"/>
      <line x1="36" y1="43" x2="36" y2="37"/>
      <line x1="40.5" y1="47" x2="40.5" y2="33"/>
    </g>
    <text class="ph" x="62" y="45">Signals</text>
    <line class="divider" x1="22" y1="68" x2="208" y2="68"/>
    <circle class="dotN" cx="30" cy="102" r="4"/>
    <text class="row" x="46" y="100">Vision</text>
    <text class="rowsub" x="46" y="117">RGB, RGB-D, stereo</text>
    <circle class="dotN" cx="30" cy="150" r="4"/>
    <text class="row" x="46" y="148">Motion &amp; attention</text>
    <text class="rowsub" x="46" y="165">audio, IMU, gaze</text>
    <circle class="dotN" cx="30" cy="198" r="4"/>
    <text class="row" x="46" y="196">Geometry</text>
    <text class="rowsub" x="46" y="213">hands, pose, 3D maps</text>
  </g>

  <!-- Panel 3: Research Tasks -->
  <g transform="translate(625 185)">
    <rect class="panel" width="230" height="240" rx="18"/>
    <circle cx="34" cy="40" r="18" fill="#fff4dc" stroke="#f0c66f" stroke-width="1.4"/>
    <g stroke="#ef9f24" stroke-width="1.9" fill="none">
      <circle cx="34" cy="40" r="7"/>
      <circle cx="34" cy="40" r="2.6" fill="#ef9f24"/>
    </g>
    <text class="ph" x="62" y="45">Research Tasks</text>
    <line class="divider" x1="22" y1="68" x2="208" y2="68"/>
    <circle class="dotA" cx="30" cy="102" r="4"/>
    <text class="row" x="46" y="100">Perception</text>
    <text class="rowsub" x="46" y="117">action, HOI, tracking</text>
    <circle class="dotA" cx="30" cy="150" r="4"/>
    <text class="row" x="46" y="148">Reasoning</text>
    <text class="rowsub" x="46" y="165">memory, VQA, language</text>
    <circle class="dotA" cx="30" cy="198" r="4"/>
    <text class="row" x="46" y="196">Embodiment</text>
    <text class="rowsub" x="46" y="213">robotics, VLA, assistance</text>
  </g>

  <!-- Panel 4: Atlas Outputs -->
  <g transform="translate(905 185)">
    <rect class="panel" width="230" height="240" rx="18"/>
    <circle cx="34" cy="40" r="18" fill="#eef3f5" stroke="#bcccd3" stroke-width="1.4"/>
    <g fill="#5b6b73">
      <rect x="26" y="34" width="16" height="3.4" rx="1.7"/>
      <rect x="26" y="39" width="16" height="3.4" rx="1.7"/>
      <rect x="26" y="44" width="16" height="3.4" rx="1.7"/>
    </g>
    <text class="ph" x="62" y="45">Atlas Outputs</text>
    <line class="divider" x1="22" y1="68" x2="208" y2="68"/>
    <circle class="dotN" cx="30" cy="102" r="4"/>
    <text class="row" x="46" y="100">README</text>
    <text class="rowsub" x="46" y="117">scannable, linked tables</text>
    <circle class="dotN" cx="30" cy="150" r="4"/>
    <text class="row" x="46" y="148">YAML catalog</text>
    <text class="rowsub" x="46" y="165">filterable, structured</text>
    <circle class="dotN" cx="30" cy="198" r="4"/>
    <text class="row" x="46" y="196">CI-validated</text>
    <text class="rowsub" x="46" y="213">checked on every change</text>
  </g>

  <!-- feedback loop -->
  <path class="loop" d="M1020 425 C1020 492 200 492 180 433" marker-end="url(#arrow)"/>
  <rect x="503" y="476" width="194" height="22" rx="11" fill="#ffffff" stroke="#cfe6e8" stroke-width="1.2"/>
  <text class="loopText" x="600" y="491" text-anchor="middle">CURATE · VERIFY · UPDATE</text>

  <text class="rowsub" x="65" y="532" font-size="12.5">From first-person capture to multimodal signals, task families, and reusable, validated research artifacts.</text>
</svg>
