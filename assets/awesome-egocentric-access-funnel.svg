<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Egocentric resources by access state</title>
  <desc id="desc">A funnel-style snapshot of the 276 egocentric resources by public-access state: open, watch, partial, benchmark, and request, showing how much is usable today versus still unverified.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfdff"/>
      <stop offset="1" stop-color="#eef7f6"/>
    </linearGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#cfe0e4" opacity="0.4"/>
    </pattern>
    <filter id="shadow" x="-6%" y="-12%" width="112%" height="135%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#0f2a33" flood-opacity="0.10"/>
    </filter>
    <style>
      .ink { fill: #14212b; }
      .kicker { font: 700 15.3px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0b8f98; letter-spacing: .16em; }
      .title { font: 700 38.9px system-ui, -apple-system, "Segoe UI", sans-serif; }
      .subtitle { font: 500 18.9px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #53606b; }
      .row { font: 700 21.2px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #ffffff; }
      .gloss { font: 500 17.7px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #6a7882; }
    </style>
  </defs>

  <rect width="1280" height="520" fill="url(#bg)"/>
  <rect width="1280" height="520" fill="url(#dots)"/>

  <text class="kicker" x="70" y="60">ACCESS REALITY</text>
  <text class="title ink" x="70" y="104">276 egocentric resources by access state</text>
  <text class="subtitle" x="70" y="136">A snapshot of availability (not a pipeline). Roughly half are usable now; a large share are recent and still unverified.</text>

  <!-- funnel rows, centered on x=640; counts are patched by build_artifacts.rb -->
  <!-- open -->
  <rect x="190" y="186" width="900" height="56" rx="11" fill="#00a6b2" filter="url(#shadow)"/>
  <text class="row" x="640" y="221" text-anchor="middle">open &#183; 119</text>
  <text class="gloss" x="1104" y="221">usable today</text>

  <!-- watch (≈ open; drawn equal width) -->
  <rect x="190" y="252" width="900" height="56" rx="11" fill="#9aa7af" filter="url(#shadow)"/>
  <text class="row" x="640" y="287" text-anchor="middle">watch &#183; 134</text>
  <text class="gloss" x="1104" y="287">verify before use</text>

  <!-- partial -->
  <rect x="500" y="318" width="280" height="56" rx="11" fill="#ef9f24" filter="url(#shadow)"/>
  <text class="row" x="640" y="353" text-anchor="middle">partial &#183; 12</text>
  <text class="gloss" x="794" y="353">subset / annotations only</text>

  <!-- benchmark -->
  <rect x="525" y="384" width="230" height="56" rx="11" fill="#5b6b73" filter="url(#shadow)"/>
  <text class="row" x="640" y="419" text-anchor="middle">benchmark &#183; 7</text>
  <text class="gloss" x="769" y="419">eval over existing video</text>

  <!-- request -->
  <rect x="545" y="450" width="190" height="56" rx="11" fill="#d98f1f" filter="url(#shadow)"/>
  <text class="row" x="640" y="485" text-anchor="middle">request &#183; 4</text>
  <text class="gloss" x="749" y="485">license / approval needed</text>
</svg>
