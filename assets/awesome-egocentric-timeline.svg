<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Egocentric resources by era</title>
  <desc id="desc">A bar-and-trend-line chart of catalogued egocentric AI resources grouped into five eras. A rising trend line through the bar tops shows each era outgrowing the last, with 2026 already the largest era on the strength of its first half (January to June) alone.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfdff"/>
      <stop offset="0.6" stop-color="#f4faf9"/>
      <stop offset="1" stop-color="#eef7f6"/>
    </linearGradient>
    <linearGradient id="barT" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#16b3bf"/>
      <stop offset="1" stop-color="#0b8f98"/>
    </linearGradient>
    <linearGradient id="barA" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f6b54a"/>
      <stop offset="1" stop-color="#ef9f24"/>
    </linearGradient>
    <linearGradient id="area" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0f3b45" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#0f3b45" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#cfe0e4" opacity="0.4"/>
    </pattern>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="135%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#0f2a33" flood-opacity="0.10"/>
    </filter>
    <marker id="up" viewBox="0 0 10 10" refX="6.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#ef9f24"/>
    </marker>
    <style>
      .ink { fill: #14212b; }
      .kicker { font: 700 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0b8f98; letter-spacing: .16em; }
      .title { font: 700 33px system-ui, -apple-system, "Segoe UI", sans-serif; }
      .subtitle { font: 500 15px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #53606b; }
      .count { font: 800 20px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f3b45; }
      .era { font: 700 14px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #2b3a44; }
      .anchor { font: 500 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #6a7882; }
      .grid { stroke: #e2ecef; stroke-width: 1.2; }
      .gridlabel { font: 600 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #9aa7af; }
      .axis { stroke: #c2d2d8; stroke-width: 2; }
      .trend { stroke: #0f3b45; stroke-width: 3.6; fill: none; stroke-linejoin: round; stroke-linecap: round; }
      .proj { stroke: #ef9f24; stroke-width: 3.2; fill: none; stroke-dasharray: 3 7; stroke-linecap: round; }
      .callout { fill: #ffffff; stroke: #cfe6e8; stroke-width: 1.3; filter: url(#shadow); }
      .calloutText { font: 700 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f3b45; }
      .note { font: 700 11.5px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #c4801a; }
    </style>
  </defs>

  <rect width="1280" height="520" fill="url(#bg)"/>
  <rect width="1280" height="520" fill="url(#dots)"/>

  <text class="kicker" x="90" y="56">GROWTH OVER TIME</text>
  <text class="title ink" x="90" y="98">Egocentric resources by era</text>
  <text class="subtitle" x="90" y="126">Resources with a known year. Each era outgrows the last — and 2026 already leads on its first half (Jan&#8211;Jun) alone.</text>

  <!-- gridlines (count scale: y = 400 - count*3.9623) -->
  <line class="grid" x1="110" y1="360" x2="1210" y2="360"/>
  <line class="grid" x1="110" y1="321" x2="1210" y2="321"/>
  <line class="grid" x1="110" y1="281" x2="1210" y2="281"/>
  <line class="grid" x1="110" y1="242" x2="1210" y2="242"/>
  <text class="gridlabel" x="100" y="404" text-anchor="end">0</text>
  <text class="gridlabel" x="100" y="364" text-anchor="end">10</text>
  <text class="gridlabel" x="100" y="325" text-anchor="end">20</text>
  <text class="gridlabel" x="100" y="285" text-anchor="end">30</text>
  <text class="gridlabel" x="100" y="246" text-anchor="end">40</text>
  <line class="axis" x1="110" y1="400" x2="1210" y2="400"/>

  <!-- area under the trend line -->
  <path d="M190 380 L430 345 L670 269 L910 202 L1150 190 L1150 400 L190 400 Z" fill="url(#area)"/>

  <!-- bars -->
  <rect x="142" y="380" width="96" height="20" rx="5" fill="url(#barT)" filter="url(#shadow)"/>
  <rect x="382" y="345" width="96" height="55" rx="6" fill="url(#barT)" filter="url(#shadow)"/>
  <rect x="622" y="269" width="96" height="131" rx="7" fill="url(#barT)" filter="url(#shadow)"/>
  <rect x="862" y="202" width="96" height="198" rx="7" fill="url(#barT)" filter="url(#shadow)"/>
  <rect x="1102" y="190" width="96" height="210" rx="7" fill="url(#barA)" filter="url(#shadow)"/>

  <!-- trend line through bar tops, then dashed upward continuation -->
  <polyline class="trend" points="190,380 430,345 670,269 910,202 1150,190"/>
  <path class="proj" d="M1150 190 L1232 152" marker-end="url(#up)"/>
  <text class="note" x="1212" y="140" text-anchor="end">still H1</text>

  <!-- markers + counts -->
  <g>
    <circle cx="190" cy="380" r="6.5" fill="#ffffff" stroke="#0f3b45" stroke-width="2.6"/>
    <circle cx="430" cy="345" r="6.5" fill="#ffffff" stroke="#0f3b45" stroke-width="2.6"/>
    <circle cx="670" cy="269" r="6.5" fill="#ffffff" stroke="#0f3b45" stroke-width="2.6"/>
    <circle cx="910" cy="202" r="6.5" fill="#ffffff" stroke="#0f3b45" stroke-width="2.6"/>
    <circle cx="1150" cy="190" r="7" fill="#ef9f24" stroke="#ffffff" stroke-width="2.6"/>
  </g>
  <text class="count" x="190" y="364" text-anchor="middle">5</text>
  <text class="count" x="430" y="329" text-anchor="middle">14</text>
  <text class="count" x="670" y="253" text-anchor="middle">33</text>
  <text class="count" x="910" y="186" text-anchor="middle">50</text>
  <text class="count" x="1150" y="174" text-anchor="middle">53</text>

  <!-- era + anchor labels -->
  <text class="era" x="190" y="428" text-anchor="middle">&#8804; 2018</text>
  <text class="anchor" x="190" y="448" text-anchor="middle">GTEA, EgoHands</text>
  <text class="era" x="430" y="428" text-anchor="middle">2019&#8211;2021</text>
  <text class="anchor" x="430" y="448" text-anchor="middle">EPIC-100, Ego4D</text>
  <text class="era" x="670" y="428" text-anchor="middle">2022&#8211;2023</text>
  <text class="anchor" x="670" y="448" text-anchor="middle">Ego-Exo4D, HOI4D</text>
  <text class="era" x="910" y="428" text-anchor="middle">2024&#8211;2025</text>
  <text class="anchor" x="910" y="448" text-anchor="middle">EgoVideo, EgoDex</text>
  <text class="era" x="1150" y="428" text-anchor="middle">2026 (H1)</text>
  <text class="anchor" x="1150" y="448" text-anchor="middle">first half only &#183; EgoScale, EgoAVU</text>

  <!-- growth callout in the open upper-left space -->
  <g>
    <rect class="callout" x="150" y="214" width="332" height="38" rx="19"/>
    <text class="calloutText" x="172" y="238">&#8599;&#160; Each era outgrows the one before</text>
  </g>
</svg>
