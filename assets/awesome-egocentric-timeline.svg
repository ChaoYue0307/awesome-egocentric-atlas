<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Egocentric resources by era and type</title>
  <desc id="desc">A stacked bar chart of catalogued egocentric AI resources grouped into five eras and split by resource type (dataset, benchmark, model, toolkit, collection). Datasets dominated the early eras; benchmarks and models now make up a growing share, and 2026's first half (January to June) already nears the 2024 to 2025 peak. A trend line through the bar tops marks the totals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfdff"/>
      <stop offset="0.6" stop-color="#f4faf9"/>
      <stop offset="1" stop-color="#eef7f6"/>
    </linearGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#cfe0e4" opacity="0.4"/>
    </pattern>
    <filter id="shadow" x="-14%" y="-14%" width="128%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#0f2a33" flood-opacity="0.12"/>
    </filter>
    <marker id="up" viewBox="0 0 10 10" refX="6.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#ef9f24"/>
    </marker>
    <clipPath id="c1"><rect x="142" y="357" width="96" height="43" rx="8"/></clipPath>
    <clipPath id="c2"><rect x="382" y="332" width="96" height="68" rx="8"/></clipPath>
    <clipPath id="c3"><rect x="622" y="231" width="96" height="169" rx="8"/></clipPath>
    <clipPath id="c4"><rect x="862" y="170" width="96" height="230" rx="8"/></clipPath>
    <clipPath id="c5"><rect x="1102" y="195" width="96" height="205" rx="8"/></clipPath>
    <style>
      .ink { fill: #14212b; }
      .kicker { font: 700 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0b8f98; letter-spacing: .16em; }
      .title { font: 700 31px system-ui, -apple-system, "Segoe UI", sans-serif; }
      .subtitle { font: 500 14.5px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #53606b; }
      .count { font: 800 19px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f3b45; }
      .era { font: 700 14px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #2b3a44; }
      .anchor { font: 500 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #6a7882; }
      .grid { stroke: #e2ecef; stroke-width: 1.2; }
      .gridlabel { font: 600 11px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #9aa7af; }
      .axis { stroke: #c2d2d8; stroke-width: 2; }
      .trend { stroke: #0f3b45; stroke-width: 2.6; fill: none; stroke-linejoin: round; stroke-linecap: round; }
      .proj { stroke: #ef9f24; stroke-width: 3; fill: none; stroke-dasharray: 3 7; stroke-linecap: round; }
      .note { font: 700 11.5px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #c4801a; }
      .seg { stroke: #ffffff; stroke-width: 1.4; }
      .lg { font: 600 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #46525f; }
    </style>
  </defs>

  <rect width="1280" height="520" fill="url(#bg)"/>
  <rect width="1280" height="520" fill="url(#dots)"/>

  <text class="kicker" x="90" y="54">GROWTH BY TYPE</text>
  <text class="title ink" x="90" y="92">Egocentric resources by era</text>
  <text class="subtitle" x="90" y="118">Each era's bar is split by resource type. Datasets led early; benchmarks and models now dominate, and 2026 (first half only) already nears the 2024&#8211;2025 peak.</text>

  <!-- legend -->
  <g>
    <rect x="700" y="74" width="13" height="13" rx="3" fill="#0b8f98"/><text class="lg" x="719" y="85">datasets</text>
    <rect x="792" y="74" width="13" height="13" rx="3" fill="#5b6b73"/><text class="lg" x="811" y="85">benchmarks</text>
    <rect x="905" y="74" width="13" height="13" rx="3" fill="#ef9f24"/><text class="lg" x="924" y="85">models</text>
    <rect x="989" y="74" width="13" height="13" rx="3" fill="#7a6ff0"/><text class="lg" x="1008" y="85">toolkits</text>
    <rect x="1070" y="74" width="13" height="13" rx="3" fill="#b8c2c9"/><text class="lg" x="1089" y="85">collection</text>
  </g>

  <!-- gridlines (scale y = 400 - count*3.594) -->
  <line class="grid" x1="110" y1="328" x2="1210" y2="328"/>
  <line class="grid" x1="110" y1="256" x2="1210" y2="256"/>
  <line class="grid" x1="110" y1="184" x2="1210" y2="184"/>
  <text class="gridlabel" x="100" y="404" text-anchor="end">0</text>
  <text class="gridlabel" x="100" y="332" text-anchor="end">20</text>
  <text class="gridlabel" x="100" y="260" text-anchor="end">40</text>
  <text class="gridlabel" x="100" y="188" text-anchor="end">60</text>
  <line class="axis" x1="110" y1="400" x2="1210" y2="400"/>

  <!-- stacked bars (bottom-up: dataset, benchmark, model, toolkit, collection) -->
  <g clip-path="url(#c1)" filter="url(#shadow)">
    <rect class="seg" x="142" y="361" width="96" height="39" fill="#0b8f98"/>
    <rect class="seg" x="142" y="357" width="96" height="4" fill="#5b6b73"/>
  </g>
  <g clip-path="url(#c2)" filter="url(#shadow)">
    <rect class="seg" x="382" y="353" width="96" height="47" fill="#0b8f98"/>
    <rect class="seg" x="382" y="342" width="96" height="11" fill="#5b6b73"/>
    <rect class="seg" x="382" y="339" width="96" height="3" fill="#ef9f24"/>
    <rect class="seg" x="382" y="332" width="96" height="7" fill="#7a6ff0"/>
  </g>
  <g clip-path="url(#c3)" filter="url(#shadow)">
    <rect class="seg" x="622" y="335" width="96" height="65" fill="#0b8f98"/>
    <rect class="seg" x="622" y="296" width="96" height="39" fill="#5b6b73"/>
    <rect class="seg" x="622" y="253" width="96" height="43" fill="#ef9f24"/>
    <rect class="seg" x="622" y="235" width="96" height="18" fill="#7a6ff0"/>
    <rect class="seg" x="622" y="231" width="96" height="4" fill="#b8c2c9"/>
  </g>
  <g clip-path="url(#c4)" filter="url(#shadow)">
    <rect class="seg" x="862" y="303" width="96" height="97" fill="#0b8f98"/>
    <rect class="seg" x="862" y="246" width="96" height="57" fill="#5b6b73"/>
    <rect class="seg" x="862" y="174" width="96" height="72" fill="#ef9f24"/>
    <rect class="seg" x="862" y="170" width="96" height="4" fill="#7a6ff0"/>
  </g>
  <g clip-path="url(#c5)" filter="url(#shadow)">
    <rect class="seg" x="1102" y="328" width="96" height="72" fill="#0b8f98"/>
    <rect class="seg" x="1102" y="238" width="96" height="90" fill="#5b6b73"/>
    <rect class="seg" x="1102" y="199" width="96" height="39" fill="#ef9f24"/>
    <rect class="seg" x="1102" y="195" width="96" height="4" fill="#7a6ff0"/>
  </g>

  <!-- trend line through bar tops (totals) + dashed continuation -->
  <polyline class="trend" points="190,357 430,332 670,231 910,170 1150,195"/>
  <path class="proj" d="M1150 195 L1232 158" marker-end="url(#up)"/>
  <text class="note" x="1212" y="146" text-anchor="end">still H1</text>
  <g>
    <circle cx="190" cy="357" r="5.5" fill="#ffffff" stroke="#0f3b45" stroke-width="2.4"/>
    <circle cx="430" cy="332" r="5.5" fill="#ffffff" stroke="#0f3b45" stroke-width="2.4"/>
    <circle cx="670" cy="231" r="5.5" fill="#ffffff" stroke="#0f3b45" stroke-width="2.4"/>
    <circle cx="910" cy="170" r="5.5" fill="#ffffff" stroke="#0f3b45" stroke-width="2.4"/>
    <circle cx="1150" cy="195" r="6" fill="#ef9f24" stroke="#ffffff" stroke-width="2.4"/>
  </g>

  <!-- totals -->
  <text class="count" x="190" y="348" text-anchor="middle">12</text>
  <text class="count" x="430" y="323" text-anchor="middle">19</text>
  <text class="count" x="670" y="222" text-anchor="middle">47</text>
  <text class="count" x="910" y="161" text-anchor="middle">64</text>
  <text class="count" x="1150" y="186" text-anchor="middle">57</text>

  <!-- era + anchor labels -->
  <text class="era" x="190" y="428" text-anchor="middle">&#8804; 2018</text>
  <text class="anchor" x="190" y="448" text-anchor="middle">GTEA, EgoHands</text>
  <text class="era" x="430" y="428" text-anchor="middle">2019&#8211;2021</text>
  <text class="anchor" x="430" y="448" text-anchor="middle">EPIC-100, Ego4D</text>
  <text class="era" x="670" y="428" text-anchor="middle">2022&#8211;2023</text>
  <text class="anchor" x="670" y="448" text-anchor="middle">Ego-Exo4D, HOI4D</text>
  <text class="era" x="910" y="428" text-anchor="middle">2024&#8211;2025</text>
  <text class="anchor" x="910" y="448" text-anchor="middle">EgoVideo, EgoDex</text>
  <text class="era" x="1150" y="428" text-anchor="middle">2026 (H1)</text>
  <text class="anchor" x="1150" y="448" text-anchor="middle">first half only &#183; EgoScale, EgoAVU</text>
</svg>
