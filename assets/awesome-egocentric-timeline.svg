<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">Egocentric resources by era and type</title>
  <desc id="desc">A stacked bar chart of catalogued egocentric AI resources grouped into five eras and split by resource type (dataset, benchmark, model, toolkit, collection). The y-axis is generated from the latest catalog counts so bar tops, totals, and trend line stay aligned after every scan.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfdff"/>
      <stop offset="0.6" stop-color="#f4faf9"/>
      <stop offset="1" stop-color="#eef7f6"/>
    </linearGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#cfe0e4" opacity="0.4"/>
    </pattern>
    <filter id="shadow" x="-14%" y="-14%" width="128%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#0f2a33" flood-opacity="0.12"/>
    </filter>
    <marker id="up" viewBox="0 0 10 10" refX="6.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#ef9f24"/>
    </marker>
    <clipPath id="c1"><rect x="142" y="443" width="96" height="37" rx="8"/></clipPath>
    <clipPath id="c2"><rect x="382" y="420.6" width="96" height="59.4" rx="8"/></clipPath>
    <clipPath id="c3"><rect x="622" y="362.4" width="96" height="117.6" rx="8"/></clipPath>
    <clipPath id="c4"><rect x="862" y="290.7" width="96" height="189.3" rx="8"/></clipPath>
    <clipPath id="c5"><rect x="1102" y="202.2" width="96" height="277.8" rx="8"/></clipPath>
    <style>
      .ink { fill: #14212b; }
      .kicker { font: 700 14px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0b8f98; letter-spacing: .16em; }
      .title { font: 700 34px system-ui, -apple-system, "Segoe UI", sans-serif; }
      .subtitle { font: 500 16px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #53606b; }
      .count { font: 800 21px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #0f3b45; }
      .era { font: 700 15px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #2b3a44; }
      .anchor { font: 500 13px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #6a7882; }
      .grid { stroke: #e2ecef; stroke-width: 1.2; }
      .gridlabel { font: 600 12px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #9aa7af; }
      .axis { stroke: #c2d2d8; stroke-width: 2; }
      .trend { stroke: #0f3b45; stroke-width: 2.6; fill: none; stroke-linejoin: round; stroke-linecap: round; }
      .proj { stroke: #ef9f24; stroke-width: 3; fill: none; stroke-dasharray: 3 7; stroke-linecap: round; }
      .note { font: 700 12.5px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #c4801a; }
      .seg { stroke: #ffffff; stroke-width: 1.4; }
      .lg { font: 600 14px system-ui, -apple-system, "Segoe UI", sans-serif; fill: #46525f; }
    </style>
  </defs>

  <rect width="1280" height="560" fill="url(#bg)"/>
  <rect width="1280" height="560" fill="url(#dots)"/>

  <text class="kicker" x="90" y="50">GROWTH BY TYPE</text>
  <text class="title ink" x="90" y="92">Egocentric resources by era</text>
  <text class="subtitle" x="90" y="120">Each era's bar is split by type. 2026 (first half only) already exceeds the 2024&#8211;2025 peak.</text>

  <g>
    <rect x="90" y="145" width="14" height="14" rx="3" fill="#0b8f98"/><text class="lg" x="111" y="157">datasets</text>
    <rect x="193" y="145" width="14" height="14" rx="3" fill="#5b6b73"/><text class="lg" x="214" y="157">benchmarks</text>
    <rect x="316" y="145" width="14" height="14" rx="3" fill="#ef9f24"/><text class="lg" x="337" y="157">models</text>
    <rect x="407" y="145" width="14" height="14" rx="3" fill="#7a6ff0"/><text class="lg" x="428" y="157">toolkits</text>
    <rect x="502" y="145" width="14" height="14" rx="3" fill="#b8c2c9"/><text class="lg" x="523" y="157">collection</text>
  </g>

  <!-- gridlines generated from live catalog max=248, axis_max=250, tick_step=50 -->
  <line class="grid" x1="110" y1="424" x2="1210" y2="424"/>
  <text class="gridlabel" x="100" y="428" text-anchor="end">50</text>
  <line class="grid" x1="110" y1="368" x2="1210" y2="368"/>
  <text class="gridlabel" x="100" y="372" text-anchor="end">100</text>
  <line class="grid" x1="110" y1="312" x2="1210" y2="312"/>
  <text class="gridlabel" x="100" y="316" text-anchor="end">150</text>
  <line class="grid" x1="110" y1="256" x2="1210" y2="256"/>
  <text class="gridlabel" x="100" y="260" text-anchor="end">200</text>
  <line class="grid" x1="110" y1="200" x2="1210" y2="200"/>
  <text class="gridlabel" x="100" y="204" text-anchor="end">250</text>
  <text class="gridlabel" x="100" y="484" text-anchor="end">0</text>
  <line class="axis" x1="110" y1="480" x2="1210" y2="480"/>

  <!-- stacked bars generated from live era/kind counts -->
  <g clip-path="url(#c1)" filter="url(#shadow)">
    <rect class="seg" x="142" y="454.2" width="96" height="25.8" fill="#0b8f98"/>
    <rect class="seg" x="142" y="453.1" width="96" height="1.1" fill="#5b6b73"/>
    <rect class="seg" x="142" y="443" width="96" height="10.1" fill="#ef9f24"/>
  </g>
  <g clip-path="url(#c2)" filter="url(#shadow)">
    <rect class="seg" x="382" y="464.3" width="96" height="15.7" fill="#0b8f98"/>
    <rect class="seg" x="382" y="459.8" width="96" height="4.5" fill="#5b6b73"/>
    <rect class="seg" x="382" y="425.1" width="96" height="34.7" fill="#ef9f24"/>
    <rect class="seg" x="382" y="421.8" width="96" height="3.4" fill="#7a6ff0"/>
  </g>
  <g clip-path="url(#c3)" filter="url(#shadow)">
    <rect class="seg" x="622" y="453.1" width="96" height="26.9" fill="#0b8f98"/>
    <rect class="seg" x="622" y="434.1" width="96" height="19" fill="#5b6b73"/>
    <rect class="seg" x="622" y="370.2" width="96" height="63.8" fill="#ef9f24"/>
    <rect class="seg" x="622" y="363.5" width="96" height="6.7" fill="#7a6ff0"/>
    <rect class="seg" x="622" y="362.4" width="96" height="1.1" fill="#b8c2c9"/>
  </g>
  <g clip-path="url(#c4)" filter="url(#shadow)">
    <rect class="seg" x="862" y="426.2" width="96" height="53.8" fill="#0b8f98"/>
    <rect class="seg" x="862" y="399.4" width="96" height="26.9" fill="#5b6b73"/>
    <rect class="seg" x="862" y="298.6" width="96" height="100.8" fill="#ef9f24"/>
    <rect class="seg" x="862" y="290.7" width="96" height="7.8" fill="#7a6ff0"/>
  </g>
  <g clip-path="url(#c5)" filter="url(#shadow)">
    <rect class="seg" x="1102" y="440.8" width="96" height="39.2" fill="#0b8f98"/>
    <rect class="seg" x="1102" y="375.8" width="96" height="65" fill="#5b6b73"/>
    <rect class="seg" x="1102" y="219" width="96" height="156.8" fill="#ef9f24"/>
    <rect class="seg" x="1102" y="202.2" width="96" height="16.8" fill="#7a6ff0"/>
  </g>

  <polyline class="trend" points="190,443 430,420.6 670,362.4 910,290.7 1150,202.2"/>
  <path class="proj" d="M1150 202.2 L1230 185.2" marker-end="url(#up)"/>
  <text class="note" x="1210" y="164.2" text-anchor="middle">H1 only</text>
  <g>
    <circle cx="190" cy="443" r="5.5" fill="#ffffff" stroke="#0f3b45" stroke-width="2.4"/>
    <circle cx="430" cy="420.6" r="5.5" fill="#ffffff" stroke="#0f3b45" stroke-width="2.4"/>
    <circle cx="670" cy="362.4" r="5.5" fill="#ffffff" stroke="#0f3b45" stroke-width="2.4"/>
    <circle cx="910" cy="290.7" r="5.5" fill="#ffffff" stroke="#0f3b45" stroke-width="2.4"/>
    <circle cx="1150" cy="202.2" r="6" fill="#ef9f24" stroke="#ffffff" stroke-width="2.4"/>
  </g>

  <text class="count" x="190" y="431" text-anchor="middle">33</text>
  <text class="count" x="430" y="408.6" text-anchor="middle">53</text>
  <text class="count" x="670" y="350.4" text-anchor="middle">105</text>
  <text class="count" x="910" y="278.7" text-anchor="middle">169</text>
  <text class="count" x="1150" y="190.2" text-anchor="middle">248</text>

  <text class="era" x="190" y="510" text-anchor="middle">&#8804; 2018</text>
  <text class="anchor" x="190" y="531" text-anchor="middle">CMU-MMAC, GTEA</text>
  <text class="era" x="430" y="510" text-anchor="middle">2019&#8211;2021</text>
  <text class="anchor" x="430" y="531" text-anchor="middle">EPIC-100, Ego4D</text>
  <text class="era" x="670" y="510" text-anchor="middle">2022&#8211;2023</text>
  <text class="anchor" x="670" y="531" text-anchor="middle">Ego-Exo4D, HOI4D</text>
  <text class="era" x="910" y="510" text-anchor="middle">2024&#8211;2025</text>
  <text class="anchor" x="910" y="531" text-anchor="middle">EgoVideo, EgoDex</text>
  <text class="era" x="1150" y="510" text-anchor="middle">2026 (H1)</text>
  <text class="anchor" x="1150" y="531" text-anchor="middle">first half only &#183; DreamDojo, EgoScale</text>
</svg>
