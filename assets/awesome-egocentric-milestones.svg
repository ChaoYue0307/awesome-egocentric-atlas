    <image href="milestones/egoscale.png" x="14" y="14" width="262" height="112" preserveAspectRatio="xMidYMid slice" clip-path="url(#clip-thumb)"/>
    <rect class="image-frame" x="14" y="14" width="262" height="112" rx="8"/>
    <rect class="date-pill" x="14" y="140" width="86" height="24" rx="12"/>
