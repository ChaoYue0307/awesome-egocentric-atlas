<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="3730" viewBox="0 0 1280 3730" role="img" aria-labelledby="title desc">
  <title id="title">Representative egocentric AI milestones</title>
  <desc id="desc">A generated milestone poster for Awesome Egocentric Atlas, showing 17 representative field-defining works from 2009-2026. Card labels come from data/resources.yml and image panels are shown uncropped.</desc>
  <defs>
