    <text x="14" y="185" class="name">Project Aria Datasets</text>
    <text x="14" y="207" class="note">Smart-glasses sensing platform.</text>
  </g>

  <g transform="translate(340 390)">
    <rect class="card" x="0" y="0" width="290" height="218" rx="8"/>
    <image href="milestones/egovlp.png" x="14" y="14" width="262" height="112" preserveAspectRatio="xMidYMid slice" clip-path="url(#clip-thumb)"/>
    <rect class="image-frame" x="14" y="14" width="262" height="112" rx="8"/>
