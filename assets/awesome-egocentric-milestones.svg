  <g transform="translate(340 630)">
    <rect class="card" x="0" y="0" width="290" height="218" rx="8"/>
    <image href="milestones/egovla.png" x="14" y="14" width="262" height="112" preserveAspectRatio="xMidYMid slice" clip-path="url(#clip-thumb)"/>
    <rect class="image-frame" x="14" y="14" width="262" height="112" rx="8"/>
    <rect class="date-pill" x="14" y="140" width="86" height="24" rx="12"/>
    <text x="30" y="157" class="date">2025-07</text>
    <rect class="kind-pill" x="110" y="140" width="58" height="24" rx="12"/>
    <text x="125" y="157" class="kind">Model</text>
    <text x="14" y="185" class="name">EgoVLA</text>
    <text x="14" y="207" class="note">Human ego video to robot policies.</text>
