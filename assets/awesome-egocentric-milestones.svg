<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="2220" viewBox="0 0 1280 2220" role="img" aria-labelledby="title desc">
  <title id="title">Egocentric AI milestone timeline</title>
  <desc id="desc">Representative egocentric AI works from CMU-MMAC in 2009 through Xperience-10M in 2026.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fcfc"/>
      <stop offset="0.52" stop-color="#edf7f7"/>
      <stop offset="1" stop-color="#fff8ec"/>
    </linearGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#067882" opacity="0.12"/>
    </pattern>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0f2a33" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="ribbon" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#067882"/>
      <stop offset="0.56" stop-color="#00a6b2"/>
      <stop offset="1" stop-color="#ef9f24"/>
    </linearGradient>
    <clipPath id="clip-thumb"><rect x="18" y="18" width="334" height="334" rx="8"/></clipPath>
    <style>
      .title { font: 800 38px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #14212b; letter-spacing: 0; }
      .subtitle { font: 560 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #53616b; letter-spacing: 0; }
      .stat { font: 800 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #067882; letter-spacing: 0; }
      .stat-label { font: 650 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #53616b; letter-spacing: .04em; text-transform: uppercase; }
      .date { font: 820 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #067882; letter-spacing: 0; }
      .kind { font: 760 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #34424d; letter-spacing: .04em; text-transform: uppercase; }
      .name { font: 820 22px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #14212b; letter-spacing: 0; }
      .note { font: 650 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #53616b; letter-spacing: 0; }
      .card { fill: #ffffff; stroke: #ccdde1; stroke-width: 1.3; filter: url(#shadow); }
      .image-frame { fill: none; stroke: rgba(255,255,255,.82); stroke-width: 1.2; }
      .date-pill { fill: rgba(6,120,130,.09); stroke: rgba(6,120,130,.18); }
      .kind-pill { fill: #f2f5f6; stroke: #d5e2e5; }
      .node { fill: #ffffff; stroke: url(#ribbon); stroke-width: 5; }
    </style>
  </defs>

  <rect width="1280" height="2220" fill="url(#bg)"/>
  <rect width="1280" height="2220" fill="url(#dots)"/>

  <path d="M76 124 C224 92 360 140 512 118 S796 92 946 120 S1126 132 1204 96" fill="none" stroke="url(#ribbon)" stroke-width="7" stroke-linecap="round" opacity="0.75"/>
  <circle class="node" cx="76" cy="124" r="8"/>
  <circle class="node" cx="356" cy="124" r="8"/>
  <circle class="node" cx="642" cy="106" r="8"/>
  <circle class="node" cx="930" cy="116" r="8"/>
  <circle class="node" cx="1204" cy="96" r="8"/>

  <text x="40" y="58" class="title">Egocentric AI Milestone Timeline</text>
  <text x="42" y="88" class="subtitle">Representative works from first-person activity recognition to petascale world-model corpora.</text>

  <g transform="translate(878 35)">
    <rect x="0" y="0" width="92" height="58" rx="8" fill="#ffffff" stroke="#ccdde1"/>
