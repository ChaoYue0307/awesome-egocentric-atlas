  <g transform="translate(32 630)">
    <rect class="card" x="0" y="0" width="290" height="218" rx="8"/>
    <image href="milestones/hot3d.png" x="14" y="14" width="262" height="112" preserveAspectRatio="xMidYMid slice" clip-path="url(#clip-thumb)"/>
    <rect class="image-frame" x="14" y="14" width="262" height="112" rx="8"/>
    <rect class="date-pill" x="14" y="140" width="86" height="24" rx="12"/>
    <text x="30" y="157" class="date">2024-06</text>
    <rect class="kind-pill" x="110" y="140" width="74" height="24" rx="12"/>
    <text x="125" y="157" class="kind">Dataset</text>
    <text x="14" y="185" class="name">HOT3D</text>
    <text x="14" y="207" class="note">3D hand-object tracking from AR.</text>
